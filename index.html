<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="AtlasForge — an evidence-led product-development methodology for turning operational ambiguity into validated, buildable products.">
<title>AtlasForge — Methodology Operating View</title>
<style>
:root{
  --ink:#2B2119;
  --ink-deep:#17110D;
  --orange:#F47B16;
  --orange-deep:#A84B07;
  --orange-soft:#FFF0E2;
  --paper:#F7F5F2;
  --card:#FFFFFF;
  --hair:#E6DED5;
  --line:#EEE8E1;
  --muted:#746B63;
  --muted2:#9B9188;
  --green:#147A5A;
  --green-soft:#EAF7F1;
  --amber:#A86208;
  --amber-soft:#FFF6DF;
  --red:#B42318;
  --red-soft:#FFF0EF;
  --blue:#2E64C7;
  --blue-soft:#EDF3FF;
  --shadow:0 1px 2px rgba(43,33,25,.04),0 10px 30px rgba(43,33,25,.04);
  --shadow-lg:0 24px 70px rgba(35,25,18,.18);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper)}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
button,select{font:inherit}
button{cursor:pointer}
a{color:inherit}
.top{position:sticky;top:0;z-index:30;border-bottom:1px solid var(--hair);background:rgba(255,255,255,.92);backdrop-filter:blur(10px);box-shadow:0 1px 0 rgba(43,33,25,.03)}
.top-in{height:84px;padding:0 16px;display:flex;align-items:center;gap:14px}
.brand-home{display:flex;align-items:center;gap:12px;padding:5px 7px;border-radius:12px;border:0;background:transparent;color:inherit;text-align:left}
.brand-home:hover{background:#FAF7F3}
.logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--orange),#FF9E43);box-shadow:0 9px 22px rgba(244,123,22,.25);color:#27160A;font-weight:950;font-size:19px}
.brand b{display:block;font-size:15px;letter-spacing:.08em}
.brand small{display:block;font-size:11px;color:var(--muted);margin-top:-1px}
.ctx{font-size:12px;color:var(--muted2);margin-left:4px}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;border:1px solid #FFD5AF;background:#FFF7EF;color:var(--orange-deep)}
.tbtn{border:1px solid var(--hair);background:#fff;border-radius:9px;padding:8px 11px;color:var(--muted);font-size:12px;font-weight:650}
.tbtn:hover{background:var(--paper);transform:translateY(-1px)}
.shell{display:flex;min-height:calc(100vh - 84px)}
.rail{width:244px;flex:0 0 244px;border-right:1px solid var(--hair);background:#fff;padding:16px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:84px;height:calc(100vh - 84px);overflow:auto}
.nav-group{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.13em;font-weight:800;padding:14px 11px 6px}
.nav{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--muted);border-radius:9px;padding:9px 11px;text-align:left;font-size:13.5px;transition:.16s ease}
.nav:hover{background:var(--paper);transform:translateX(1px)}
.nav.active{background:var(--orange-soft);color:var(--orange-deep);font-weight:700}
.nico{width:20px;height:20px;display:grid;place-items:center;color:var(--muted2)}
.nav.active .nico{color:var(--orange)}
.nav .lbl{flex:1}
.nav .badge{font-size:10px;padding:2px 6px;border-radius:999px;background:#EEE8E1;color:var(--muted)}
.nav.active .badge{background:var(--orange);color:#281507}
.rail-foot{margin-top:auto;padding:18px 9px 4px;border-top:1px solid var(--line);font-size:11px;color:var(--muted2);line-height:1.55}
main{flex:1;min-width:0;padding:22px;max-width:1240px}
.stack>*+*{margin-top:20px}
.eyebrow{font-size:11px;color:var(--orange-deep);text-transform:uppercase;letter-spacing:.14em;font-weight:850}
h1{font-size:26px;line-height:1.12;letter-spacing:-.035em;margin:3px 0 0}
h2{font-size:16px;margin:0;letter-spacing:-.015em}
h3{margin:0;font-size:15px;letter-spacing:-.01em}
.sub{font-size:13.5px;color:var(--muted);margin:5px 0 0;max-width:820px}
.card{background:var(--card);border:1px solid var(--hair);border-radius:14px;box-shadow:var(--shadow)}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:11px}
.sec-head .hint{font-size:12.5px;color:var(--muted);margin-top:2px}
.sec-head .count{font-size:11px;color:var(--muted2);white-space:nowrap}
.foundation-page{display:flex;flex-direction:column;gap:14px}
.placement-note{display:inline-flex;align-items:center;gap:6px;border:1px solid #FFD7B4;background:#FFF8F1;color:var(--orange-deep);border-radius:999px;padding:6px 10px;font-size:11px;font-weight:750}
.thesis-card{position:relative;overflow:hidden;border-radius:20px;background:
  radial-gradient(circle at 85% 10%,rgba(244,123,22,.21),transparent 28%),
  linear-gradient(135deg,#17110D 0%,#2A1D14 58%,#15100C 100%);
  color:#fff;padding:30px;box-shadow:var(--shadow-lg)}
.thesis-card:after{content:"";position:absolute;right:-110px;bottom:-150px;width:340px;height:340px;border-radius:50%;border:1px solid rgba(255,255,255,.06)}
.thesis-card .overline{color:#FFB777;font-weight:850;letter-spacing:.15em;text-transform:uppercase;font-size:11px}
.thesis-overview{font-size:18px;line-height:1.55;color:#EFE6DE;margin:14px 0 28px;max-width:980px}
.thesis-line{font-size:clamp(30px,4.4vw,56px);line-height:1.02;letter-spacing:-.05em;font-weight:820;max-width:980px;margin:10px 0 0}
.question-card{padding:18px 20px;border-left:4px solid var(--orange);display:grid;grid-template-columns:170px 1fr;gap:18px;align-items:start}
.question-card .q-label{color:var(--orange-deep);font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:850}
.question-card p{margin:0;color:#4F463E;font-size:14px}
.overview-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;align-items:start}
.method-image-card{padding:12px;overflow:hidden}
.image-button{display:block;width:100%;border:0;background:transparent;padding:0;border-radius:12px;overflow:hidden;position:relative}
.image-button img{width:100%;height:auto;display:block;border-radius:11px}
.image-button:after{content:"Click to enlarge";position:absolute;right:12px;bottom:12px;background:rgba(23,17,13,.86);color:#fff;padding:6px 9px;border-radius:999px;font-size:10px;font-weight:700}
.proof-column{display:flex;flex-direction:column;gap:10px}
.proof-stat{padding:16px;display:flex;align-items:center;gap:12px}
.proof-num{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--orange-soft);color:var(--orange-deep);font-size:19px;font-weight:850;flex:0 0 auto}
.proof-stat b{display:block;font-size:13px}
.proof-stat span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.principle-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.principle-card{padding:18px;position:relative;overflow:hidden}
.principle-card .pnum{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--orange-soft);color:var(--orange-deep);font-size:11px;font-weight:850;margin-bottom:12px}
.principle-card p{margin:5px 0 0;color:var(--muted);font-size:13px}
.gate{border:1px solid #F6C99E;background:linear-gradient(180deg,#FFF9F3,#fff);border-radius:16px;padding:17px;display:flex;align-items:flex-start;gap:14px}
.gate-ic{width:42px;height:42px;display:grid;place-items:center;border-radius:12px;background:var(--orange-soft);color:var(--orange-deep);font-size:20px;flex:0 0 auto}
.gate h3{font-size:17px}
.gate p{margin:3px 0 0;color:var(--muted);font-size:13px}
.gate-status{margin-left:auto;border-radius:999px;padding:6px 9px;background:var(--green-soft);color:var(--green);font-size:10px;font-weight:800;white-space:nowrap}
.phase-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}
.phase-card{width:100%;border:1px solid var(--hair);background:#fff;border-radius:13px;padding:15px;text-align:left;display:grid;grid-template-columns:45px 1fr auto;gap:12px;align-items:start;transition:.16s ease;box-shadow:var(--shadow)}
.phase-card:hover{transform:translateY(-2px);border-color:#E9B98B;box-shadow:0 12px 28px rgba(43,33,25,.09)}
.phase-num{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--orange),#FF9C40);color:#261508;font-weight:900}
.phase-card p{margin:5px 0 0;color:var(--muted);font-size:12.5px}
.phase-arrow{color:var(--muted2);font-size:20px}
.phase-card .phase-question{display:block;color:var(--orange-deep);font-size:11px;font-weight:700;margin-top:8px}
.artifact-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:11px}
.artifact-card{width:100%;border:1px solid var(--hair);background:#fff;border-radius:13px;padding:16px;text-align:left;transition:.16s ease;box-shadow:var(--shadow)}
.artifact-card:hover{transform:translateY(-2px);border-color:#E9B98B;box-shadow:0 12px 28px rgba(43,33,25,.09)}
.doc-tag{display:inline-flex;border-radius:999px;background:var(--orange-soft);color:var(--orange-deep);padding:4px 7px;font-size:9.5px;font-weight:850;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.artifact-card p{margin:6px 0 0;color:var(--muted);font-size:12.5px}
.card-open{display:block;margin-top:10px;color:var(--orange-deep);font-size:11px;font-weight:750}
.outcome-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px}
.outcome-card{padding:16px;min-height:160px;display:flex;flex-direction:column}
.outcome-card .onum{width:33px;height:33px;border-radius:10px;display:grid;place-items:center;background:var(--blue-soft);color:var(--blue);font-size:11px;font-weight:850;margin-bottom:14px}
.outcome-card p{margin:6px 0 0;color:var(--muted);font-size:12.5px}
.outcome-card .signal{margin-top:auto;padding-top:13px;color:var(--ink);font-size:11.5px;font-weight:700}
.decision-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px}
.decision-card{padding:17px;min-height:175px}
.decision-card .decision-icon{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-weight:900;margin-bottom:13px}
.decision-card p{margin:6px 0 0;color:var(--muted);font-size:12.5px}
.decision-card.proceed .decision-icon{background:var(--green-soft);color:var(--green)}
.decision-card.refine .decision-icon{background:var(--amber-soft);color:var(--amber)}
.decision-card.hold .decision-icon{background:var(--blue-soft);color:var(--blue)}
.decision-card.stop .decision-icon{background:var(--red-soft);color:var(--red)}
.operating-model{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.model-card{padding:18px}
.model-card h3{font-size:17px}
.model-card p{margin:5px 0 0;color:var(--muted);font-size:13px}
.model-list{margin:13px 0 0;padding:0;list-style:none;display:grid;gap:7px}
.model-list li{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:#514840}
.model-list li:before{content:"";width:7px;height:7px;border-radius:999px;background:var(--orange);margin-top:6px;flex:0 0 auto}
.prototype-banner{border:1px solid #C7D8FC;background:var(--blue-soft);color:#234E9A;border-radius:12px;padding:11px 13px;font-size:12px;line-height:1.5}
.prototype-banner b{display:block;color:#1F4A99}
.scrim{position:fixed;inset:0;background:rgba(23,17,13,.42);z-index:50;animation:fade .18s ease}
.drawer{position:fixed;right:0;top:0;height:100%;width:min(500px,100%);background:#fff;z-index:51;border-left:1px solid var(--hair);box-shadow:-20px 0 60px rgba(35,25,18,.18);overflow:auto;animation:slide .22s ease}
.drawer-head{position:sticky;top:0;z-index:2;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--hair);padding:18px 20px;display:flex;align-items:flex-start;gap:12px}
.drawer-head .grow{flex:1}
.drawer-head .k{font-size:10px;color:var(--orange-deep);text-transform:uppercase;letter-spacing:.12em;font-weight:850}
.drawer-head h2{font-size:20px;margin-top:4px}
.close{width:38px;height:38px;border-radius:10px;border:1px solid var(--hair);background:#fff;color:var(--muted);font-size:20px}
.close:hover{background:var(--paper)}
.drawer-body{padding:20px}
.drawer-body>*+*{margin-top:18px}
.drawer-copy{font-size:14px;color:#4F463E;margin:0}
.detail-box{border:1px solid var(--hair);border-radius:13px;padding:14px}
.detail-box .label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-bottom:7px}
.detail-box p{margin:0;color:#4F463E;font-size:13px}
.detail-box ul{margin:0;padding-left:18px;color:#4F463E;font-size:13px}
.detail-box li+li{margin-top:6px}
.image-modal{position:fixed;inset:18px;z-index:61;display:flex;align-items:center;justify-content:center}
.image-frame{position:relative;max-width:96vw;max-height:92vh;overflow:auto;border-radius:18px;background:#fff;padding:10px;box-shadow:0 30px 100px rgba(0,0,0,.38)}
.image-frame img{display:block;max-width:none;width:min(1500px,92vw);height:auto;border-radius:12px}
.image-close{position:fixed;right:27px;top:27px;z-index:63;width:44px;height:44px;border-radius:999px;border:0;background:rgba(255,255,255,.96);box-shadow:0 10px 30px rgba(0,0,0,.2);font-size:22px}
.about-modal{position:fixed;inset:0;z-index:61;display:grid;place-items:center;padding:16px}
.about-card{width:min(620px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;padding:24px;border:1px solid var(--hair);box-shadow:var(--shadow-lg);position:relative}
.about-card h2{font-size:22px}
.about-card p{color:var(--muted);font-size:13.5px}
.about-card .close{position:absolute;right:14px;top:14px}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slide{from{transform:translateX(30px);opacity:.6}to{transform:translateX(0);opacity:1}}
@media(max-width:1100px){
  .overview-grid,.operating-model{grid-template-columns:1fr}
  .outcome-grid{grid-template-columns:repeat(2,1fr)}
  .artifact-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:850px){
  .rail{width:210px;flex-basis:210px}
  .phase-grid,.principle-grid,.decision-grid{grid-template-columns:1fr}
  .question-card{grid-template-columns:1fr}
  .ctx{display:none}
}
@media(max-width:680px){
  .top-in{height:72px}
  .shell{display:block}
  .rail{position:static;width:100%;height:auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));padding:10px;border-right:0;border-bottom:1px solid var(--hair)}
  .nav-group,.rail-foot{display:none}
  .nav{padding:8px 9px}
  main{padding:14px}
  .top-actions .chip{display:none}
  .artifact-grid,.outcome-grid{grid-template-columns:1fr}
  .thesis-card{padding:22px}
  .thesis-overview{font-size:16px}
}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <button class="brand-home" data-act="goto" data-view="overview" aria-label="Open AtlasForge overview">
      <span class="logo">F</span>
      <span class="brand"><b>ATLASFORGE</b><small>An AtlasFlow methodology</small></span>
    </button>
    <span class="ctx">Product-development methodology · 8 phases · 9 canonical artifacts</span>
    <div class="top-actions">
      <span class="chip">Evidence before expansion</span>
      <button class="tbtn" data-act="about">About</button>
    </div>
  </div>
</header>
<div class="shell">
  <aside class="rail" id="rail"></aside>
  <main id="main" tabindex="-1"></main>
</div>
<div id="overlay"></div>

Advance / refine / reframe / stop recommendation"], "question": "Does the concept work across representative scenarios strongly enough to justify the next investment?"}, {"num": "06", "title": "Architecture & Delivery Planning", "summary": "Define the safest, smallest, and most reusable path from validated concept to functioning product.", "outputs": ["Stage-appropriate architecture", "Data flow and system responsibilities", "Backlog, release gates, and test model"], "question": "What is the safest, smallest, and most reusable path from validated concept to functioning product?"}, {"num": "07", "title": "Governance, Decisions, Risks & Change Control", "summary": "Keep product evolution intentional, traceable, and aligned to evidence as more people and decisions enter the process.", "outputs": ["Decision log", "RAID log", "Scope-change and escalation controls"], "question": "How will decisions, assumptions, risks, changes, and ownership remain visible as the work expands?"}, {"num": "08", "title": "Closeout, Recommendation & Handoff", "summary": "Convert the work completed into a clear decision, durable evidence, and an executable next step.", "outputs": ["Executive readout", "Findings and assumption disposition", "Next-phase recommendation and handoff package"], "question": "What did the engagement prove, what remains uncertain, and who owns the next executable step?"}], "artifacts": [{"doc": "Document 01", "title": "Engagement Intake and Qualification", "summary": "A disciplined first view of the opportunity: problem, stakeholders, commercial path, and qualification decision.", "use": "Use at the first gate to decide whether the opportunity should proceed, pause, be referred, or be declined."}, {"doc": "Document 02", "title": "Discovery and Evidence Guide", "summary": "The field guide for interviews, evidence capture, workflow observation, and finding the real operational problem.", "use": "Use during interviews and observation to capture the workflow, evidence, ex "Templates, Checklists, and Artifact Standards", "summary": "Reusable templates, naming conventions, folder standards, and execution controls that keep engagements coherent and reusable.", "use": "Use across every engagement to keep file structures, naming, quality, and execution patterns coherent and reusable."}], "outcomes": [{"num": "01", "title": "Opportunity clarity", "summary": "A concise opportunity statement, stakeholder map, problem framing, and go / no-go qualification decision.", "signal": "A clear proceed / hold / refer / decline decision"}, {"num": "02", "title": "Workflow evidence", "summary": "Observed current-state workflow, representative scenarios, quotes, exceptions, and measures that ground the product thesis.", "signal": "Observed workflow and representative evidence"}, {"num": "03", "title": "Buildable definition", "summary": "Capabilities, requirements, data contracts, state models, and acceptance criteria that protect the core hypothesis from feature sprawl.", "signal": "A bounded product definition builders can act on"}, {"num": "04", "title": "Decision-ready validation", "summary": "Scenario-based validation, scorecards, findings, and a clear advance / refine / reframe / stop recommendation.", "signal": "An advance / refine / reframe / stop recommendation"}, {"num": "05", "title": "Stage-appropriate architecture", "summary": "A smallest-credible architecture, explicit system responsibilities, release gates, test model, and migration triggers.", "signal": "A smallest-credible system and release path"}, {"num": "06", "title": "Governance discipline", "summary": "Decision logs, RAID controls, change management, and defined roles so product evolution remains intentional and traceable.", "signal": "Visible decisions, assumptions, risks, and change control"}, {"num": "07", "title": "Executable handoff", "summary": "A closeout package that summarizes findings, implications, recommendation options, ownership, and next-step definition.", "signal": "A clean package with ownership and next steps"}, {"num": "08", "title": "Reusable standards", "summary": "Templates, checklists, file naming, version rules, and artifact standards that keep engagements coherent and reusable.", "signal": "Reusable templates, naming, and quality controls"}], "principles": [{"title": "Start with the work", "summary": "AtlasForge begins with the actual workflow—inputs, handoffs, judgments, exceptions, and evidence—before technology choices or screen design."}, {"title": "Prove the smallest credible path", "summary": "Instead of rushing to a large build, AtlasForge uses a steel-thread mindset, representative scenarios, and stage gates to control scope."}, {"title": "Keep authority visible", "summary": "Human review, final accountability, and automation boundaries are made explicit so trust grows with evidence, not hype."}, {"title": "Move from prototype to delivery responsibly", "summary": "Requirements, architecture, governance, testing, and handoff are built into the method so promising ideas can become functioning products."}]};
const ST = { view:'overview', detail:null, imageOpen:false, about:false };

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function icon(name){
  const icons={
    overview:'◫', principles:'◆', pathway:'→', artifacts:'▤', outcomes:'✓', gates:'◇'
  };
  return icons[name] || '•';
}
function nav(){
  const operating=[
    ['pathway','Method pathway','pathway','8'],
    ['artifacts','Artifact system','artifacts','9'],
    ['outcomes','Customer outcomes','outcomes','8'],
    ['gates','Decision gates','gates',null]
  ];
  const foundation=[
    ['overview','AtlasForge overview','overview',null],
    ['principles','Method principles','principles','4']
  ];
  const items = arr => arr.map(x=>`<button class="nav ${ST.view===x[0]?'active':''}" data-act="goto" data-view="${x[0]}">
    <span class="nico">${icon(x[2])}</span><span class="lbl">${x[1]}</span>${x[3]?`<span class="badge">${x[3]}</span>`:''}
  </button>`).join('');
  return `<div class="nav-group">Method views</div>${items(operating)}<div class="nav-group">Product foundation</div>${items(foundation)}
    <div class="rail-foot">AtlasForge makes the work, evidence, product boundary, decision gates, and delivery path visible before expansion.</div>`;
}
function headerBlock(eyebrow,title,sub){
  return `<div><div class="eyebrow">${eyebrow}</div><h1>${title}</h1><p class="sub">${sub}</p></div>`;
}
function secHead(title,hint,count){
  return `<div class="sec-head"><div><h2>${title}</h2><div class="hint">${hint}</div></div>${count?`<div class="count">${count}</div>`:''}</div>`;
}
function viewOverview(){
  return `<div class="foundation-page">
    <div><span class="placement-note">ⓘ Product foundation</span></div>
    <article class="thesis-card">
      <div class="overline">AtlasForge overview</div>
      <p class="thesis-overview">AtlasForge is the practical product-development methodology AtlasFlow uses to move from a real operational problem to a decision-ready product and delivery path. It creates evidence before expansion, keeps human judgment visible, and controls scope at every stage.</p>
      <div class="overline">Product thesis</div>
      <div class="thesis-line">Turn operational ambiguity into a validated, buildable product—without scaling before the evidence is ready.</div>
    </article>
    <article class="card question-card">
      <div class="q-label">Evaluation question</div>
      <p>Does AtlasForge help customers qualify the opportunity, understand the real work, validate the product shape, define the smallest credible architecture, and make a clear next-investment decision—while keeping scope, risk, human authority, and evidence visible?</p>
    </article>
    <div class="overview-grid">
      <article class="card method-image-card">
        <button class="image-button" data-act="openimage" aria-label="Open the AtlasForge methodology visual full screen"><img src="${METHOD_IMAGE}" alt="AtlasForge methodology visual"></button>
      </article>
      <div class="proof-column">
        <article class="card proof-stat"><div class="proof-num">8</div><div><b>Lifecycle phases</b><span>From opportunity qualification through closeout and executable handoff.</span></div></article>
        <article class="card proof-stat"><div class="proof-num">9</div><div><b>Canonical artifacts</b><span>Reusable guides, definitions, playbooks, logs, and standards.</span></div></article>
        <article class="card proof-stat"><div class="proof-num">4</div><div><b>Governing principles</b><span>Start with the work, prove the smallest path, keep authority visible, and deliver responsibly.</span></div></article>
        <div class="prototype-banner"><b>What this view proves</b>AtlasForge is not just a philosophy. It is a legible operating system that connects evidence, scope, validation, architecture, governance, and handoff.</div>
      </div>
    </div>
  </div>`;
}
function viewPrinciples(){
  return `<div class="stack">${headerBlock('Product foundation','The principles that govern every AtlasForge engagement.','These rules protect the hypothesis from premature technology choices, feature sprawl, invisible automation, and delivery plans that outrun the evidence.')}
    <section>${secHead('Governing principles','The standards used to shape decisions at every phase.','4 principles')}
      <div class="principle-grid">${DATA.principles.map((p,i)=>`<article class="card principle-card"><span class="pnum">0${i+1}</span><h3>${esc(p.title)}</h3><p>${esc(p.summary)}</p></article>`).join('')}</div>
    </section>
    <section>
      <article class="gate"><div class="gate-ic">⚒</div><div><h3>Evidence before expansion</h3><p>AtlasForge prevents architecture, scope, and automation from expanding faster than the product hypothesis can be tested.</p></div><span class="gate-status">Governing rule</span></article>
    </section>
    <section>${secHead('Human and system boundary','The methodology keeps product assistance separate from human authority.')}
      <div class="operating-model">
        <article class="card model-card"><div class="eyebrow">AtlasForge prepares</div><h3>Evidence, product definition, validation, and delivery choices</h3><ul class="model-list"><li>Structures the workflow and representative scenarios</li><li>Defines capabilities, data, states, and acceptance criteria</li><li>Surfaces risks, assumptions, tradeoffs, and recommendations</li><li>Preserves traceability from evidence to build decision</li></ul></article>
        <article class="card model-card"><div class="eyebrow">Humans decide</div><h3>Whether to proceed, refine, hold, reframe, or stop</h3><ul class="model-list"><li>Approve the product thesis and scope boundary</li><li>Judge whether the evidence is strong enough to advance</li><li>Accept operational, commercial, technical, and governance tradeoffs</li><li>Own final accountability and the next investment decision</li></ul></article>
      </div>
    </section>
  </div>`;
}
function viewPathway(){
  return `<div class="stack">${headerBlock('Method views','A structured path from opportunity to product decision.','Each phase answers a different question and leaves behind enough evidence to support the next gate.')}
    <article class="gate"><div class="gate-ic">→</div><div><h3>Current method focus: prove the smallest credible path</h3><p>Move only as far as the evidence supports. Every phase should sharpen the next decision rather than create activity for its own sake.</p></div><span class="gate-status">8 phases</span></article>
    <section>${secHead('AtlasForge pathway','Select a phase to see its decision question and required outputs.','Click any phase')}
      <div class="phase-grid">${DATA.phases.map((p,i)=>`<button class="phase-card" data-act="detail" data-kind="phase" data-index="${i}">
        <span class="phase-num">${esc(p.num)}</span><span><h3>${esc(p.title)}</h3><p>${esc(p.summary)}</p><span class="phase-question">${esc(p.question)}</span></span><span class="phase-arrow">›</span>
      </button>`).join('')}</div>
    </section>
  </div>`;
}
function viewArtifacts(){
  return `<div class="stack">${headerBlock('Method views','Every stage leaves behind usable, decision-grade artifacts.','The artifact system makes the work legible to customers, validators, builders, sponsors, and future owners.')}
    <section>${secHead('Canonical artifact system','Select an artifact to see how it is used.','9 documents')}
      <div class="artifact-grid">${DATA.artifacts.map((a,i)=>`<button class="artifact-card" data-act="detail" data-kind="artifact" data-index="${i}"><span class="doc-tag">${esc(a.doc)}</span><h3>${esc(a.title)}</h3><p>${esc(a.summary)}</p><span class="card-open">Open artifact role ›</span></button>`).join('')}</div>
    </section>
  </div>`;
}
function viewOutcomes(){
  return `<div class="stack">${headerBlock('Method views','Clear outputs at every gate, not just activity.','AtlasForge produces decision-ready outputs that connect the operational problem to a responsible product and delivery path.')}
    <section>${secHead('Customer outcomes','What a customer should be able to see and use when the work is complete.','8 outcomes')}
      <div class="outcome-grid">${DATA.outcomes.map((o,i)=>`<article class="card outcome-card"><span class="onum">${esc(o.num)}</span><h3>${esc(o.title)}</h3><p>${esc(o.summary)}</p><span class="signal">${esc(o.signal)}</span></article>`).join('')}</div>
    </section>
    <section><article class="gate"><div class="gate-ic">✓</div><div><h3>The result is a decision, not a pile of documents.</h3><p>The artifacts matter because together they let stakeholders understand what was learned, what is buildable, what remains uncertain, and what should happen next.</p></div><span class="gate-status">Decision-ready</span></article></section>
  </div>`;
}
function viewGates(){
  const cards=[
    ['proceed','✓','Advance','The opportunity is qualified, evidence supports the thesis, the scope is bounded, and the next investment is justified.'],
    ['refine','↻','Refine','The core opportunity remains credible, but the workflow, product definition, scenario set, or architecture needs focused adjustment.'],
    ['hold','Ⅱ','Hold','The opportunity may be real, but timing, evidence, ownership, data, commercial path, or operational readiness is not sufficient.'],
    ['stop','×','Stop or reframe','Evidence does not support the current thesis, or a materially different problem and product shape should be considered.']
  ];
  return `<div class="stack">${headerBlock('Method views','Decision gates keep momentum disciplined.','AtlasForge does not assume every opportunity should become a larger build. It makes the advance, refine, hold, reframe, or stop decision explicit.')}
    <section>${secHead('Gate outcomes','The recommendation must be tied to visible evidence, assumptions, risks, and ownership.')}
      <div class="decision-grid">${cards.map(c=>`<article class="card decision-card ${c[0]}"><span class="decision-icon">${c[1]}</span><h3>${c[2]}</h3><p>${c[3]}</p></article>`).join('')}</div>
    </section>
    <section>${secHead('Gate checklist','Before the method advances, AtlasForge asks whether the next investment is earned.')}
      <div class="operating-model">
        <article class="card model-card"><div class="eyebrow">Evidence check</div><h3>What is known?</h3><ul class="model-list"><li>The operational problem is grounded in observed work</li><li>Representative scenarios test the core hypothesis</li><li>The product boundary and human authority are explicit</li><li>Risks, assumptions, exceptions, and unresolved questions are visible</li></ul></article>
        <article class="card model-card"><div class="eyebrow">Investment check</div><h3>What should happen next?</h3><ul class="model-list"><li>The next stage has a specific decision objective</li><li>Scope is limited to the smallest credible path</li><li>Architecture and governance are stage-appropriate</li><li>Ownership, deliverables, and acceptance conditions are clear</li></ul></article>
      </div>
    </section>
  </div>`;
}
const VIEWS={overview:viewOverview,principles:viewPrinciples,pathway:viewPathway,artifacts:viewArtifacts,outcomes:viewOutcomes,gates:viewGates};
function render(){
  document.getElementById('rail').innerHTML=nav();
  document.getElementById('main').innerHTML=(VIEWS[ST.view]||viewOverview)();
  renderOverlay();
}
function renderOverlay(){
  const host=document.getElementById('overlay');
  let out='';
  if(ST.imageOpen){
    out=`<div class="scrim" data-act="closeoverlay"></div><div class="image-modal"><button class="image-close" data-act="closeoverlay" aria-label="Close full-screen methodology image">×</button><div class="image-frame"><img src="${METHOD_IMAGE}" alt="AtlasForge methodology visual full-screen view"></div></div>`;
  } else if(ST.detail){
    const {kind,index}=ST.detail;
    const item=DATA[kind==='phase'?'phases':'artifacts'][index];
    if(item){
      if(kind==='phase'){
        out=`<div class="scrim" data-act="closeoverlay"></div><aside class="drawer" aria-label="${esc(item.title)} details">
          <div class="drawer-head"><span class="phase-num">${esc(item.num)}</span><div class="grow"><div class="k">AtlasForge phase</div><h2>${esc(item.title)}</h2></div><button class="close" data-act="closeoverlay">×</button></div>
          <div class="drawer-body"><p class="drawer-copy">${esc(item.summary)}</p>
            <div class="detail-box"><div class="label">Decision question</div><p>${esc(item.question)}</p></div>
            <div class="detail-box"><div class="label">Required outputs</div><ul>${item.outputs.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
            <div class="detail-box"><div class="label">Gate standard</div><p>Advance only when these outputs make the next product or investment decision clearer, safer, and more executable.</p></div>
          </div></aside>`;
      } else {
        out=`<div class="scrim" data-act="closeoverlay"></div><aside class="drawer" aria-label="${esc(item.title)} details">
          <div class="drawer-head"><span class="phase-num">${String(index+1).padStart(2,'0')}</span><div class="grow"><div class="k">${esc(item.doc)}</div><h2>${esc(item.title)}</h2></div><button class="close" data-act="closeoverlay">×</button></div>
          <div class="drawer-body"><p class="drawer-copy">${esc(item.summary)}</p>
            <div class="detail-box"><div class="label">How AtlasForge uses it</div><p>${esc(item.use)}</p></div>
            <div class="detail-box"><div class="label">Artifact standard</div><p>The artifact must make the underlying evidence, decision, scope boundary, owner, and next use clear enough that another person can act without reconstructing the engagement.</p></div>
          </div></aside>`;
      }
    }
  } else if(ST.about){
    out=`<div class="scrim" data-act="closeoverlay"></div><div class="about-modal"><article class="about-card"><button class="close" data-act="closeoverlay">×</button><div class="eyebrow">About this operating view</div><h2>AtlasForge, presented in the same product family as Arc.</h2><p>This version uses Arc’s operating-view structure: a persistent product header, grouped navigation, separate method and foundation views, clickable detail layers, and a full-screen model visual.</p><p>Forge keeps its own orange and warm-neutral identity while adopting the same interaction rhythm and information hierarchy.</p></article></div>`;
  }
  host.innerHTML=out;
  document.body.style.overflow=out?'hidden':'';
}
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  if(!el)return;
  const act=el.dataset.act;
  if(act==='goto'){ST.view=el.dataset.view;ST.detail=null;ST.imageOpen=false;ST.about=false;render();document.getElementById('main').focus({preventScroll:true});window.scrollTo({top:0,behavior:'smooth'});}
  if(act==='detail'){ST.detail={kind:el.dataset.kind,index:Number(el.dataset.index)};renderOverlay();}
  if(act==='openimage'){ST.imageOpen=true;renderOverlay();}
  if(act==='about'){ST.about=true;renderOverlay();}
  if(act==='closeoverlay'){ST.detail=null;ST.imageOpen=false;ST.about=false;renderOverlay();}
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&(ST.detail||ST.imageOpen||ST.about)){ST.detail=null;ST.imageOpen=false;ST.about=false;renderOverlay();}});
render();
</script>
</body>
</html>
